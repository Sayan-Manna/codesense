spring:
  application:
    name: codesense

  # ─── PostgreSQL ───────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/codesense
    username: codesense
    password: codesense
    driver-class-name: org.postgresql.Driver

  # ─── JPA / Hibernate ─────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─── Flyway ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ─── Redis ───────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
