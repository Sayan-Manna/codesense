spring:
  application:
    name: codesense

  # ─── PostgreSQL ───────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5433/codesense
    username: codesense
    password: codesense
    driver-class-name: org.postgresql.Driver

  # ─── JPA / Hibernate ─────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─── Flyway ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ─── Redis ───────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379

  # ─── Kafka ───────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all         # wait for all in-sync replicas to acknowledge (strongest durability)
      retries: 3
    consumer:
      group-id: codesense-core
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.codesense.*"

server:
  port: 8080

# ─── App-specific settings ───────────────────────────
app:
  github:
    webhook-secret: "codesense-dev-secret"   # must match what you set in GitHub webhook settings
  kafka:
    topics:
      pr-received: codesense.pr.received
      analysis-completed: codesense.analysis.completed
      pr-merged: codesense.pr.merged
